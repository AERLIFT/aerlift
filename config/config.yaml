#%% paths
data_dir:    '/aerlift/data'
raw_dir:     '/aerlift/data/0_raw'
munged_dir:  '/aerlift/data/1_munged'
trimmed_dir: '/aerlift/data/2_trimmed'
flagged_dir: 'aerlift/data/3_flagged'
results_dir: 'results'
log_dir:     'logs'

#%% campaign
campaign:
  name:     'AERLIFT'
  timezone: 'America/Los_Angeles'
  start: '2022-09-01'
  end: '2023-03-31'

#%% instruments
instruments:
  anemometer:
    file_ext:  '.txt'
    skiprows:  6
    usecols:   [0, 1, 3, 4]
    threshold:
      flow_indicator: 0.5
  aranet:
    file_ext:   '.csv'
  lascar:
    file_ext:   '.txt'
    usecols: [1, 2, 3]
  atmotube:
    file_ext: '.csv'
  aulifants:
    file_ext: '.CSV'
  hhb:
    file_ext: '.csv'
    alphasense:
      position_1: 'NO2'
      position_2: 'O3'
      position_3: null
      position_4: null
    cols_keep:
      - 'DateTimeUTC'
      - 'HHBserial'
      - 'SampleName'
      - 'SEN55_PM1.0'
      - 'SEN55_PM2.5'
      - 'SEN55_PM4.0'
      - 'SEN55_PM10'
      - 'SEN55_RH'
      - 'SEN55_Temp'
      - 'SEN55_RawVOC'
      - 'SEN55_RawNOx'
      - 'G.SCD30_CO2'
      - 'G.Alphasense1_Algorithm1'
      - 'G.Alphasense2_Algorithm1'
  upas:
    file_ext: '.txt'
    pattern: '*.txt'
    cols_keep:
      - 'DateTimeUTC'
      - 'UPASserial'
      - 'SampleName'
      - 'CartridgeID'
      - 'SampleTime'
      - 'BatteryCharge'
      - 'AtmoT'
      - 'AtmoP'
      - 'AtmoRH'
      - 'AtmoDensity'
      - 'AtmoAlt'
      - 'AccelX'
      - 'AccelY'
      - 'AccelZ'
      - 'StepCount'
      - 'LUX'
      - 'UVindex'
      - 'HighVisRaw'
      - 'LowVisRaw'
      - 'IRRaw'
      - 'UVRaw'
      - 'PMMeasCnt'
      - 'PM1MC'
      - 'PM1MCVar'
      - 'PM2_5MC'
      - 'PM2_5MCVar'
      - 'PM4MC'
      - 'PM4MCVar'
      - 'PM10MC'
      - 'PM10MCVar'
      - 'PM0_5NC'
      - 'PM0_5NCVar'
      - 'PM1NC'
      - 'PM1NCVar'
      - 'PM2_5NC'
      - 'PM2_5NCVar'
      - 'PM4NC'
      - 'PM4NCVar'
      - 'PM10NC'
      - 'PM10NCVar'
      - 'PMtypicalParticleSize'
      - 'PMtypicalParticleSizeVar'
      - 'PM2_5SampledMassOffset'
      - 'CO2'
      - 'SCDT'
      - 'SCDRH'
      - 'VOCRaw'
      - 'NOXRaw'
      - 'LogFilename'
      - 'StartDateTimeUTC'

#%% trim criteria
exclude:
  anemometer: []
  aranet:     ['16A28']
  lascar:     []
  hhb:        []
  upas:       []

#%% flag criteria
flag:
  universal:
    temperature_min:  -5.0    # cold winter nights
    temperature_max:  50.0    # extreme summer days
    rh_min:           0.0
    rh_max:           100.0
    pressure_min:     950.0   # hPa, accounting for altitude variation
    pressure_max:     1050.0

  anemometer:
    bits:
      4: 'low_flow'
    thresholds:
      flow_indicator_min: 0.5

  aranet:
    bits:
      4: 'co2_low'
      8: 'co2_high'
    thresholds:
      co2_min:          400.0
      co2_max:          5000.0
      temperature_min:  -5.0
      temperature_max:  50.0
      rh_min:           0.0
      rh_max:           100.0
      pressure_min:     950.0
      pressure_max:     1050.0

  lascar:
    bits:
      4: 'co_negative'
      8: 'co_high'
    thresholds:
      co_min:   0.0
      co_max:   200.0

  atmotube:
    bits:
      4: 'co_negative'
      8: 'co_high'
    thresholds:
      co_min: 0.0
      co_max: 200.0
      voc_raw_min: 0.0
      pm_min: 0.0

  aulifants:
    bits:
      4: 'voltage_negative'
      8: 'voltage_high'
    thresholds:
      voltage_min: 0.0
      voltage_max: 240.0


  hhb:
    bits:
      4: 'pm_negative'
      8: 'electrochemical_warmup'
    thresholds:
      pm_min:           0.0
      warmup_minutes:   5
      temperature_min:  -5.0
      temperature_max:  50.0
      rh_min:           0.0
      rh_max:           100.0
      voc_raw_min:      0.0
      nox_raw_min:      0.0
      co2_min:          400.0
      co2_max:          5000.0

  upas:
    bits:
      4:  'pm_negative'
      8:  'low_battery'
      16: 'pm_zero_run'
    thresholds:
      pm_min:           0.0
      battery_min:      20
      pm_zero_run_mins: 10
      temperature_min:  -5.0
      temperature_max:  50.0
      rh_min:           0.0
      rh_max:           100.0
      co2_min:          400.0
      co2_max:          5000.0
      voc_raw_min:      0.0
      nox_raw_min:      0.0